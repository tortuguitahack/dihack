version: '3.8'

services:
  jarviz:
    build: ./
    container_name: jarviz_app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JARVIZ_URL=http://localhost:8000
      - SUPABASE_URL=
      - SUPABASE_ANON_KEY=
      - GRAFANA_URL=
    depends_on:
      - postgres
    volumes:
      - ./:/app

  postgres:
    image: ankane/pgvector:latest
    container_name: jarviz_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jarviz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
